</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

                            <div className="border-t border-b border-amber-700/50 py-4 my-4">
                                <p className="text-amber-200 serif font-semibold text-sm mb-3">
                                    {endingData.outcome}
                                </p>
                                <p className="text-amber-50 leading-relaxed text-sm">
                                    {endingData.description}
                                </p>
                            </div>
                        </div>

                        <button
                            onClick={handleRestart}
                            className="w-full group relative overflow-hidden bg-gradient-to-r from-amber-700/50 to-amber-900/60 border-2 border-amber-600 p-4 rounded-sm transition-all duration-300 hover:from-amber-600/60 hover:to-amber-800/70 hover:border-amber-500 hover:shadow-lg hover:shadow-amber-500/30 flex items-center justify-center gap-2"
                        >
                            <div className="relative z-10 flex items-center justify-center gap-2">
                                <RotateCcw size={18} className="text-amber-200" />
                                <span className="text-amber-100 serif font-semibold">
                                    開啟新的人生
                                </span>
                            </div>
                            <div className="absolute inset-0 bg-gradient-to-r from-amber-400/0 to-amber-400/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        </button>

                        <div className="bg-black/30 border border-amber-700/30 p-4 rounded-sm">
                            <p className="text-xs text-amber-200/50 text-center leading-relaxed">
                                你的選擇已被歷史記錄。下一次，或許你會改寫另一段傳奇。
                            </p>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-gradient-to-b from-amber-950/80 via-amber-900/60 to-black parchment-texture">
                    <div className="fixed inset-0 pointer-events-none opacity-10" style={{
                        backgroundImage: 'url("data:image/svg+xml,%3Csvg width=\'100\' height=\'100\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Ctext x=\'10\' y=\'50\' font-size=\'80\' opacity=\'0.1\'%3E※%3C/text%3E%3C/svg%3E")'
                    }}></div>

                    <div className="relative z-10 max-w-2xl mx-auto min-h-screen p-4 flex flex-col justify-center">
                        <div className="bg-black/40 backdrop-blur-md border-2 border-amber-700/50 rounded-lg p-6 shadow-2xl shadow-black/80">
                            {gameState === 'start' && renderStart()}
                            {gameState === 'class' && renderClass()}
                            {gameState === 'story' && renderStory()}
                            {gameState === 'ending' && renderEnding()}
                        </div>

                        <div className="mt-8 text-center">
                            <div className="flex justify-center gap-1 text-amber-700/40">
                                <span>※</span>
                                <span>※</span>
                                <span>※</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MedievalLifeGame />);
    </script>
</body>
</html>
