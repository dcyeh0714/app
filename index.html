<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中世紀人生文字遊戲</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 m-0 p-0">

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <script type="text/babel">
        const { useState } = React;

        // 模擬 Lucide Icon 組件
        const ChevronRight = ({ size = 20 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        );
        const RotateCcw = ({ size = 18 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );

        const MedievalLifeGame = () => {
            const [gameState, setGameState] = useState('start');
            const [selectedGender, setSelectedGender] = useState(null);
            const [selectedClass, setSelectedClass] = useState(null);
            const [currentStory, setCurrentStory] = useState(null);
            const [ending, setEnding] = useState(null);

            const stories = {
                male_commoner: {
                    title: '平民男孩', time: '1347年 黑死病與飢荒',
                    dilemma: '災荒與瘟疫奪走了村裡大半人口，領主卻派武裝侍從強行收走最後的口糧當作「盾牌稅」。',
                    choices: [
                        { label: '選擇 A：隱忍交糧，加入宗教遊行', ending: 'male_commoner_a' },
                        { label: '選擇 B：拒絕交糧，率眾反抗', ending: 'male_commoner_b' }
                    ]
                },
                female_commoner: {
                    title: '平民女孩', time: '1347年 黑死病與飢荒',
                    dilemma: '父母在瘟疫中雙亡，根據封建法律，你若想繼承家裡的租地，必須向領主繳納高昂的「單身稅/繼承稅」。',
                    choices: [
                        { label: '選擇 A：無力繳稅，逃往城市', ending: 'female_commoner_a' },
                        { label: '選擇 B：留在村裡向神父求助', ending: 'female_commoner_b' }
                    ]
                },
                male_citizen: {
                    title: '市民男子', time: '1453年 君士坦丁堡陷落',
                    dilemma: '奧斯曼土耳其攻陷了君士坦丁堡，傳統絲綢之路被切斷，香料價格暴漲。同時，古騰堡剛完善了活字印刷術。',
                    choices: [
                        { label: '選擇 A：投資活字印刷作坊', ending: 'male_citizen_a' },
                        { label: '選擇 B：出資加入遠洋商隊', ending: 'male_citizen_b' }
                    ]
                },
                female_citizen: {
                    title: '市民女性', time: '1453年 君士坦丁堡陷落',
                    dilemma: '你的富商丈夫在貿易途中過世。行會長老們欺負你是寡婦，試圖強行收回你家的呢絨商號與財產。',
                    choices: [
                        { label: '選擇 A：上訴城市議會，捍衛財產權', ending: 'female_citizen_a' },
                        { label: '選擇 B：贊助拜占庭學者', ending: 'female_citizen_b' }
                    ]
                },
                male_noble: {
                    title: '貴族騎士', time: '1415年 英法百年戰爭',
                    dilemma: '國王發出最高徵召令，要求所有封建騎士自備盔甲馬匹，渡海前往法蘭西戰場與英軍決戰。',
                    choices: [
                        { label: '選擇 A：履行誓言，穿甲奔赴戰場', ending: 'male_noble_a' },
                        { label: '選擇 B：繳納盾牌稅，留守領地', ending: 'male_noble_b' }
                    ]
                },
                female_noble: {
                    title: '貴族女性', time: '1415年 英法百年戰爭',
                    dilemma: '為了家族政治利益，你的父親決定將你聯姻給一個年邁殘暴的邊境伯爵。',
                    choices: [
                        { label: '選擇 A：服從家族命令，完成聯姻', ending: 'female_noble_a' },
                        { label: '選擇 B：宣稱聽到神聖召喚，入修道院', ending: 'female_noble_b' }
                    ]
                }
            };

            const endings = {
                male_commoner_a: { title: '鞭笞者的絕望', outcome: '【歷史事件 - 鞭笞者運動與心靈絕望】', description: '你加入了四處流浪的「鞭笞者」隊伍，用皮鞭抽打自己以求上帝寬恕。然而，瘋狂的集會加速了鼠疫傳播，你在極度虛弱與絕望中染病死去。', tone: '悲劇' },
                male_commoner_b: { title: '瓦特·泰勒的火焰', outcome: '【歷史事件 - 1381年瓦特·泰勒農民起義】', description: '你加入了席捲全國的農民反抗軍。雖然起義最終被國王殘酷鎮壓，你也在倫敦橋下戰死，但這場烈火迫使領主們不敢再任意奴役農民。', tone: '壯烈' },
                female_commoner_a: { title: '城市自由之夢', outcome: '【微觀歷史 - 城市自由與「一年零一天」法則】', description: '你成功躲進了城市的紡織作坊做苦工。根據中世紀法律「城市的空氣帶來自由」，只要農奴在城市裡成功躲滿「一年零一天」，原領主就再也無權抓你。', tone: '希望' },
                female_commoner_b: { title: '廢墟中的收穫', outcome: '【微觀歷史 - 黑死病過後農村女性的短暫黃金期】', description: '由於黑死病導致農村勞動力極度短缺，領主不得不妥協，甚至破天荒允許你以女性身份獨立承包耕地、領取高額工資。', tone: '堅韌' },
                male_citizen_a: { title: '宗教改革的幕後推手', outcome: '【歷史事件 - 1517年宗教改革的幕後推手】', description: '你的印刷廠生意興隆，書籍成本暴跌。幾十年後，一位叫馬丁·路德的修士寫下了《九十五條論綱》，透過你的印刷機傳遍全歐洲。', tone: '影響深遠' },
                male_citizen_b: { title: '大航海時代的黎明', outcome: '【歷史事件 - 大航海時代的黎明】', description: '地中海貿易沒落了，但你的商船隊毅然轉向大西洋。幾十年後，這股尋找東方新航線的市民資本，直接催生了哥倫布與達伽馬的遠航。', tone: '開創' },
                female_citizen_a: { title: '獨立女性行會大師', outcome: '【微觀歷史 - 獨立女性行會大師（Master）】', description: '你勝訴了！你在商場上展現了驚人的手腕，成為城市裡極少數能獨立經營大商號、甚至在行會裡擁有投票權的女性。', tone: '突破' },
                female_citizen_b: { title: '文藝復興的女性庇護者', outcome: '【歷史事件 - 義大利文藝復興的女性庇護者】', description: '你將商號改為沙龍，庇護了大量帶著古籍逃難的學者。在你們這些富裕市民的資金贊助下，失落千年的希臘羅馬古典文化在義大利半島重新復活。', tone: '文化復興' },
                male_noble_a: { title: '阿金庫爾的悲劇', outcome: '【歷史事件 - 阿金庫爾戰役與騎士階級的沒落】', description: '在暴雨後的泥濘中，你和法國重裝騎士們發動衝鋒，卻遭到英國長弓兵遮天蔽日的箭雨射擊。這場戰役標誌著傳統騎士階級的軍事沒落。', tone: '悲劇' },
                male_noble_b: { title: '鄉紳的晚年', outcome: '【微觀歷史 - 地方鄉紳與封建領地的莊園晚年】', description: '你避開了慘烈的戰火，在自己的領地上安穩地經營莊園、收取地租。你雖然失去了戰場的榮譽，卻以一個富裕地方鄉紳的身份安享晚年。', tone: '隱退' },
                female_noble_a: { title: '城堡女主人的堅守', outcome: '【微觀歷史 - 城堡女主人與戰時指揮官】', description: '幾年後丈夫戰死。當敵軍來圍攻城堡時，你展現了堅韌，親自穿上軟甲、登上城牆指揮留守的民兵成功死守城堡。你證明了自己是城堡真正的守護者。', tone: '堅堅' },
                female_noble_b: { title: '修道院中的知識女性', outcome: '【微觀歷史 - 修道院中的高階知識女性】', description: '在修道院的高牆內，你避開了生育的鬼門關，學會了拉丁文、哲學與草藥醫學。在女性被剝奪受教權的時代，修道院反成了你實踐精神自由的聖所。', tone: '自由' }
            };

            const handleGenderSelect = (gender) => {
                setSelectedGender(gender);
                setGameState('class');
            };

            const handleClassSelect = (socialClass) => {
                setSelectedClass(socialClass);
                const storyKey = `${selectedGender}_${socialClass}`;
                setCurrentStory(storyKey);
                setGameState('story');
            };

            const handleChoice = (endingKey) => {
                setEnding(endingKey);
                setGameState('ending');
            };

            const handleRestart = () => {
                setGameState('start');
                setSelectedGender(null);
                setSelectedClass(null);
                setCurrentStory(null);
                setEnding(null);
            };

            const renderStart = () => (
                <div className="space-y-8">
                    <div className="text-center">
                        <h1 className="text-4xl font-bold text-amber-200 mb-3 font-serif">中世紀人生</h1>
                        <p className="text-lg text-amber-100/80 font-serif italic">一千年前的選擇，改變了歷史</p>
                    </div>
                    <div className="bg-black/30 border-2 border-amber-700/50 p-6 rounded-sm">
                        <p className="text-amber-50 leading-relaxed text-center mb-6">你即將踏入1300-1450年間的歐洲。在瘟疫、戰爭與變革的時代，每一個選擇都可能改寫你的人生軌跡。</p>
                    </div>
                    <div className="space-y-4">
                        <p className="text-amber-200 text-center font-serif text-lg">選擇你的性別</p>
                        <div className="grid grid-cols-2 gap-4">
                            <button onClick={() => handleGenderSelect('male')} className="bg-gradient-to-b from-amber-700/40 to-amber-900/60 border-2 border-amber-600/60 p-6 rounded-sm text-center cursor-pointer hover:from-amber-600">
                                <p className="text-3xl mb-2">👨</p>
                                <p className="text-amber-100 font-serif font-semibold">男性</p>
                            </button>
                            <button onClick={() => handleGenderSelect('female')} className="bg-gradient-to-b from-amber-700/40 to-amber-900/60 border-2 border-amber-600/60 p-6 rounded-sm text-center cursor-pointer hover:from-amber-600">
                                <p className="text-3xl mb-2">👩</p>
                                <p className="text-amber-100 font-serif font-semibold">女性</p>
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderClass = () => (
                <div className="space-y-6">
                    <button onClick={() => setGameState('start')} className="text-amber-200/60 text-sm mb-4 cursor-pointer hover:text-amber-200">← 返回</button>
                    <div className="text-center"><p className="text-amber-200 font-serif text-lg mb-2">選擇你的社會身份</p></div>
                    <div className="space-y-3">
                        {[
                            { key: 'commoner', name: '平民', emoji: '🌾', desc: '農民、手工業者' },
                            { key: 'citizen', name: '市民', emoji: '🪙', desc: '商人、行會成員' },
                            { key: 'noble', name: '貴族', emoji: '⚔️', desc: '騎士、領主' }
                        ].map(cls => (
                            <button key={cls.key} onClick={() => handleClassSelect(cls.key)} className="w-full bg-gradient-to-r from-amber-700/30 to-amber-900/50 border-2 border-amber-600/60 p-5 rounded-sm flex items-center justify-between text-left cursor-pointer hover:from-amber-600">
                                <div className="flex items-center gap-3">
                                    <span className="text-2xl">{cls.emoji}</span>
                                    <div>
                                        <p className="text-amber-100 font-serif font-semibold text-lg">{cls.name}</p>
                                        <p className="text-amber-200/60 text-sm">{cls.desc}</p>
                                    </div>
                                </div>
                                <ChevronRight size={20} />
                            </button>
                        ))}
                    </div>
                </div>
            );

            const renderStory = () => {
                const story = stories[currentStory];
                if (!story) return null;
                return (
                    <div className="space-y-6">
                        <button onClick={() => setGameState('class')} className="text-amber-200/60 text-sm cursor-pointer hover:text-amber-200">← 返回選擇</button>
                        <div className="bg-black/40 border-2 border-amber-700/50 p-6 rounded-sm">
                            <h2 className="text-2xl font-serif font-bold text-amber-100 mb-2">{story.title}</h2>
                            <p className="text-amber-200/60 text-sm mb-4">⏰ {story.time}</p>
                            <p className="text-amber-50 leading-relaxed">{story.dilemma}</p>
                        </div>
                        <div className="space-y-3">
                            <p className="text-amber-200 font-serif">你的選擇：</p>
                            {story.choices.map((choice, idx) => (
                                <button key={idx} onClick={() => handleChoice(choice.ending)} className="w-full bg-gradient-to-b from-amber-600/30 to-amber-800/50 border-2 border-amber-600/70 p-5 rounded-sm flex items-center justify-between text-left cursor-pointer hover:from-amber-600">
                                    <p className="text-amber-50 font-medium pr-4">{choice.label}</p>
                                    <ChevronRight size={20} />
                                </button>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderEnding = () => {
                const endingData = endings[ending];
                if (!endingData) return null;
                return (
                    <div className="space-y-6">
                        <div className="bg-gradient-to-b from-amber-900/60 to-black/60 border-2 border-amber-600 p-8 rounded-sm text-center">
                            <p className="text-sm text-amber-200/60 mb-3">你的結局</p>
                            <h2 className="text-3xl font-serif font-bold text-amber-100 mb-3">{endingData.title}</h2>
                            <p className="text-amber-400 font-serif italic font-semibold">— {endingData.tone} —</p>
                            <div className="border-t border-b border-amber-700/50 py-4 my-4 text-left">
                                <p className="text-amber-200 font-serif font-semibold text-sm mb-3">{endingData.outcome}</p>
                                <p className="text-amber-50 leading-relaxed text-sm">{endingData.description}</p>
                            </div>
                        </div>
                        <button onClick={handleRestart} className="w-full bg-gradient-to-r from-amber-700/50 to-amber-900/60 border-2 border-amber-600 p-4 rounded-sm flex items-center justify-center gap-2 cursor-pointer hover:from-amber-600">
                            <RotateCcw size={18} />
                            <span className="text-amber-100 font-serif font-semibold">開啟新的人生</span>
                        </button>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-950 flex flex-col justify-center p-4">
                    <div className="max-w-2xl mx-auto w-full bg-slate-900 border-2 border-amber-700/50 rounded-lg p-6 shadow-2xl">
                        {gameState === 'start' && renderStart()}
                        {gameState === 'class' && renderClass()}
                        {gameState === 'story' && renderStory()}
                        {gameState === 'ending' && renderEnding()}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<MedievalLifeGame />);
    </script>
</body>
</html>
